name: Translate TNM to English

on:
  push:
    branches: [main]
    paths:
      - index.html
      - translate_tnm.py

  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run translation script
        env:
          TNM_SRC: index.html
          TNM_DST: index-en.html
        run: python translate_tnm.py

      - name: Commit updated index-en.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index-en.html
          git diff --cached --quiet || git commit -m "auto: update index-en.html from index.html"
          git push
