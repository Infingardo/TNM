name: Test motore di staging

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'index-en.html'
      - 'sw.js'
      - 'tests/**'
      - 'package.json'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'index.html'
      - 'index-en.html'
      - 'sw.js'
      - 'tests/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Esegui i test del motore di staging
        run: node tests/run.mjs
