<style>
:root{
  --bg:#f5f4f0;--panel:#fff;--border:#d8d5cc;--text:#1c1a16;--muted:#7a7670;

  --warn:#7a5000;--warn-bg:#fffbe6;--warn-border:#e0c040;

}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
#topbar{background:var(--accent);color:#fff;padding:12px 24px;display:flex;align-items:center;gap:16px;}
#topbar h1{font-size:14px;font-weight:700;letter-spacing:.5px;}
#topbar small{opacity:.7;font-size:11px;}
#summary{padding:16px 24px;display:flex;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--panel);}
.sum-card{padding:10px 18px;border-radius:var(--radius);font-weight:700;font-size:14px;border:1px solid;}
.sum-total{background:var(--bg);border-color:var(--border);color:var(--text);}
.sum-ok{background:var(--ok-bg);border-color:var(--ok-border);color:var(--ok);}
.sum-fail{background:var(--fail-bg);border-color:var(--fail-border);color:var(--fail);}
.sum-warn{background:var(--warn-bg);border-color:var(--warn-border);color:var(--warn);}
#controls{padding:10px 24px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
#controls select{padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;background:var(--bg);color:var(--text);}
#controls button{padding:6px 16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:12px;font-weight:600;}
#export-btn{padding:6px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:12px;color:var(--text);}
#results{padding:20px 24px 60px;}
.site-group{margin-bottom:28px;}
.site-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:var(--bg);padding:6px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);}
td{padding:7px 10px;border-bottom:1px solid #ece9e3;vertical-align:middle;line-height:1.4;}
tr.pass td{background:var(--ok-bg);}
tr.fail td{background:var(--fail-bg);}
tr.skip td{background:var(--warn-bg);}
.badge-ok{color:var(--ok);font-weight:700;}
.badge-fail{color:var(--fail);font-weight:700;}
.badge-skip{color:var(--warn);font-weight:700;}
code{font-family:'Consolas','Courier New',monospace;font-size:11px;background:#ece9e3;padding:1px 5px;border-radius:2px;}
#progress{height:3px;background:var(--ok);position:fixed;top:0;left:0;z-index:999;transition:width .15s;}
</style>

// ── ENGINE (puro, nessun DOM) ──────────────────────────────────────────
const PARENTS={
  T1:['T1','T1mi','T1a','T1b','T1c'],T2:['T2','T2a','T2b','T2c'],
  T3:['T3','T3a','T3b','T3c'],T4:['T4','T4a','T4b','T4c','T4d'],
  Tis:['Tis','Tis (DCIS)','Tis (LCIS)','Tis (Paget)','Tis (LAMN)'],
  N1:['N1','N1a','N1b','N1c'],N2:['N2','N2a','N2b','N2c'],
  N3:['N3','N3a','N3b','N3c'],M1:['M1','M1a','M1b','M1c','M1d'],
};

const STAGE_ORD={'0':0,'0a':0.1,'0is':0.2,
  'I':1,'IA':1.1,'IB':1.2,'IC':1.3,'IS':1.5,
  'II':2,'IIA':2.1,'IIB':2.2,'IIC':2.3,
  'III':3,'IIIA':3.1,'IIIB':3.2,'IIIC':3.3,'IIID':3.4,
  'IV':4,'IVA':4.1,'IVB':4.2,'IVC':4.3};

function stripPfx(c){
  if(!c)return'';
  return c.replace(/^(yp|yc|rp|p|c|r|y)/,'');
}

function codeMatch(ruleCode,sel){
  if(ruleCode==='any')return true;
  const rc=stripPfx(ruleCode),sc=stripPfx(sel);
  if(rc===sc)return true;
  const ch=PARENTS[rc];
  if(ch&&ch.map(x=>stripPfx(x)).includes(sc))return true;
  return false;
}

function ruleMatches(rule,T,N,M,extra){
  const tOk=rule.T==='any'||[].concat(rule.T).some(c=>codeMatch(c,T));
  const nOk=rule.N==='any'||[].concat(rule.N).some(c=>codeMatch(c,N));
  const mOk=rule.M==='any'||[].concat(rule.M).some(c=>codeMatch(c,M));
  let extraOk=true;
  if(rule.extra){
    for(const k in rule.extra){
      const selVal=(extra&&extra[k]!=null&&extra[k]!=='')?extra[k]:undefined;
      if(![].concat(rule.extra[k]).includes(selVal))extraOk=false;
    }
  }
  return tOk&&nOk&&mOk&&extraOk;
}

function computeBestStage(rules,T,N,M,extra){
  const matches=rules.filter(r=>ruleMatches(r,T,N,M,extra));
  if(!matches.length)return{stage:null,ambiguous:false,matchCount:0,allStages:[]};
  const distinctStages=[...new Set(matches.map(r=>r.stage))];
  if(distinctStages.length>1){
    return{stage:null,ambiguous:true,matchCount:matches.length,allStages:distinctStages};
  }
  return{stage:distinctStages[0],ambiguous:false,matchCount:matches.length,allStages:distinctStages};
}

const LN_DIM_RULES={
  testicolo:(mm,nPos)=>{
    if(nPos===0)return'N0';
    if(mm!==null&&mm<=20)return'N1'; // ≤2cm
    if(mm!==null&&mm<=50)return'N2'; // >2 e ≤5cm
    if(mm!==null&&mm>50)return'N3';  // >5cm
    if(nPos>5)return'N2';            // >5 LN+ anche senza dim
    return null; // dim necessaria per N1/N2/N3
  },
  carcinoma_cute:(mm,nPos)=>{
    if(nPos===0)return'N0';
    if(mm!==null&&mm<=30)return'N1'; // ≤3cm
    if(mm!==null&&mm<=60)return'N2'; // >3 e ≤6cm
    if(mm!==null&&mm>60)return'N3';  // >6cm
    return null;
  },
  gh_salivari:(mm,nPos,ene)=>{
    // V9: logica NUMERICA — mm ignorato, ENE determinante
    if(nPos===0)return'N0';
    if(nPos<=3&&ene==='pos')return'pN2';
    if(nPos<=3)return'pN1';
    return'pN2';
  },
  pelvi_renale:(mm,nPos)=>{
    if(nPos===0)return'N0';
    if(nPos>1)return'N2';                         // multipli = N2
    if(mm!==null&&mm<=20)return'N1';             // singolo ≤2cm
    if(mm!==null&&mm>20)return'N2';              // singolo >2cm
    return null;
  },
  uretere:(mm,nPos)=>{
    if(nPos===0)return'N0';
    if(nPos>1)return'N2';
    if(mm!==null&&mm<=20)return'N1';
    if(mm!==null&&mm>20)return'N2';
    return null;
  },
  uretra:(mm,nPos)=>{
    if(nPos===0)return'N0';
    if(nPos>1)return'N2';
    if(mm!==null&&mm<=20)return'N1';
    if(mm!==null&&mm>20)return'N2';
    return null;
  },
  mammella:(mm,nPos)=>{
    // mm = dimensione della metastasi maggiore (non del LN)
    if(nPos===0){
      if(mm!==null&&mm>0&&mm<=0.2)return'N0'; // ITC → N0(i+) — nota separata
      return'N0';
    }
    if(mm!==null&&mm>0.2&&mm<=2)return'N1mi'; // micrometastasi
    if(mm!==null&&mm>2)return null;            // dipende da numero
    return null;
  },
};

// ── RUNNER ─────────────────────────────────────────────────────────────
// Filter out non-site entries (nested objects picked up by parser)
const SITE_INDEX = SITES.filter(s => s && s.id && s.T && s.N && s.M);
let testResults = [];

function runTest(tc) {
  const site = SITE_INDEX.find(s => s.id === tc.site);
  if (!site) return { status:'skip', got:null, reason:'Sede non trovata: '+tc.site };
  const rules = getStagingRules(site, tc.variant || null);
  if (!rules || !rules.length) return { status:'skip', got:null, reason:'Nessuna regola per variante: '+(tc.variant||'default') };
  const res = computeBestStage(rules, tc.T, tc.N, tc.M, tc.extra||{});
  if (tc.expected === '__NONE__') {
    return res.stage
      ? { status:'fail', got:res.stage, reason:'Atteso: non assegnabile, ottenuto: '+res.stage }
      : { status:'pass', got:null, reason:'Correttamente non assegnabile' };
  }
  if (res.ambiguous) return { status:'fail', got:'AMBIG:'+res.allStages.join('/'), reason:'Ambiguità nel motore' };
  if (!res.stage)    return { status:'fail', got:'null', reason:'Nessuno stadio (fuori modello)' };
  if (res.stage === tc.expected) return { status:'pass', got:res.stage, reason:'' };
  return { status:'fail', got:res.stage, reason:'Atteso '+tc.expected+', ottenuto '+res.stage };
}

function runAll() {
  const bar = document.getElementById('progress');
  testResults = [];
  TEST_CASES.forEach((tc, i) => {
    bar.style.width = (i / TEST_CASES.length * 100) + '%';
    try {
      testResults.push({ ...tc, ...runTest(tc) });
    } catch(e) {
      testResults.push({ ...tc, status:'skip', got:null, reason:'Errore JS: '+e.message });
    }
  });
  bar.style.width = '100%';
  setTimeout(() => bar.style.width='0', 600);
  updateSummary();
  populateSiteFilter();
  renderResults();
}

function updateSummary() {
  const total = testResults.length;
  const pass  = testResults.filter(r=>r.status==='pass').length;
  const fail  = testResults.filter(r=>r.status==='fail').length;
  const skip  = testResults.filter(r=>r.status==='skip').length;
  document.getElementById('sum-total').textContent = total+' casi totali';
  document.getElementById('sum-ok').textContent    = '✅ '+pass+' PASS';
  document.getElementById('sum-fail').textContent  = '❌ '+fail+' FAIL';
  document.getElementById('sum-warn').textContent  = '⚠️ '+skip+' SKIP';
  const pct = Math.round(pass/total*100);
  document.getElementById('tool-version').textContent =
    'Dataset: index_v29d · '+new Date().toLocaleString('it-IT')+
    ' · '+pass+'/'+total+' ('+pct+'%)';
}

function populateSiteFilter() {
  const sel = document.getElementById('filter-site');
  const sites = [...new Set(testResults.map(r=>r.site))].sort();
  const opts = ['<option value="all">Tutte le sedi</option>'];
  for (const s of sites) {
    let name = s;
    for (let i=0; i<SITE_INDEX.length; i++) {
      const x = SITE_INDEX[i];
      if (x && x.id && x.id === s) { name = x.name; break; }
    }
    opts.push(`<option value="${s}">${name}</option>`);
  }
  sel.innerHTML = opts.join('');
}

function renderResults() {
  const fRes  = document.getElementById('filter-result').value;
  const fSite = document.getElementById('filter-site').value;
  let rows = testResults;
  if (fRes  !== 'all') rows = rows.filter(r=>r.status===fRes);
  if (fSite !== 'all') rows = rows.filter(r=>r.site===fSite);

  const bySite={};
  rows.forEach(r=>{ (bySite[r.site]=bySite[r.site]||[]).push(r); });

  if (!rows.length) {
    document.getElementById('results').innerHTML='<p style="padding:24px;color:var(--muted)">Nessun risultato.</p>';
    return;
  }

  let html='';
  for (const site of Object.keys(bySite).sort()) {
    const sr=bySite[site];
    const p=sr.filter(r=>r.status==='pass').length;
    const f=sr.filter(r=>r.status==='fail').length;
    const sk=sr.filter(r=>r.status==='skip').length;
    let sObj=null; for(let _i=0;_i<SITE_INDEX.length;_i++){if(SITE_INDEX[_i]&&SITE_INDEX[_i].id===site){sObj=SITE_INDEX[_i];break;}}
    html+=`<div class="site-group">
      <div class="site-header">
        ${sObj?sObj.name:site} <code style="font-size:10px;opacity:.6">${site}</code>
        <span style="font-weight:400;font-size:10px;text-transform:none;letter-spacing:0">
          ${p?`<span class="badge-ok">${p} pass</span> `:''}
          ${f?`<span class="badge-fail">${f} fail</span> `:''}
          ${sk?`<span class="badge-skip">${sk} skip</span>`:''}
        </span>
      </div>
      <table><thead><tr>
        <th>#</th><th>Descrizione</th><th>T</th><th>N</th><th>M</th>
        <th>Extra</th><th>Variante</th><th>Atteso</th><th>Ottenuto</th><th>Esito</th>
      </tr></thead><tbody>`;
    sr.forEach((r,i)=>{
      const ex=Object.keys(r.extra||{}).map(k=>k+'='+r.extra[k]).join(', ')||'—';
      const badge=r.status==='pass'?'<span class="badge-ok">✅ PASS</span>'
        :r.status==='fail'?'<span class="badge-fail">❌ FAIL</span>'
        :'<span class="badge-skip">⚠ SKIP</span>';
      const note=r.reason?`<br><small style="color:var(--muted);font-size:10px">${r.reason}</small>`:'';
      html+=`<tr class="${r.status}">
        <td style="color:var(--muted)">${i+1}</td>
        <td>${r.desc}</td>
        <td><code>${r.T}</code></td><td><code>${r.N}</code></td><td><code>${r.M}</code></td>
        <td style="font-size:11px;color:var(--muted)">${ex}</td>
        <td style="font-size:11px;color:var(--muted)">${r.variant||'—'}</td>
        <td><code><b>${r.expected}</b></code></td>
        <td><code>${r.got||'—'}</code></td>
        <td>${badge}${note}</td>
      </tr>`;
    });
    html+='</tbody></table></div>';
  }
  document.getElementById('results').innerHTML=html;
}

function exportCSV() {
  const headers=['site','desc','T','N','M','extra','variant','expected','got','status','reason'];
  const rows=testResults.map(r=>
    headers.map(h=>'"'+String(h==='extra'?JSON.stringify(r[h]||{}):r[h]||'').replace(/"/g,'""')+'"').join(',')
  );
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent([headers.join(','),...rows].join('\n'));
  a.download='TNM_test_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

window.addEventListener('load', runAll);
</script>
